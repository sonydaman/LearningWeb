<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <style>
      .my-para {
        color: teal;
      }
    </style>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <h1 class="heading">Feedback Form</h1>
    <h2 class="sub-heading" style="color: teal">Sample inline css</h2>
    <form class="student-form" action="" method="post">
      <div class="field">
        <label for="Name">Student Name *</label>
        <input
          placeholder="Enter Student Name"
          type="text"
          name="sName"
          id="name"
          required
        />
      </div>

      <br />
      <div class="field">
        <label for="">Student Class *</label>
        <input
          placeholder="Enter Student Class"
          type="text"
          name="sClass"
          id="class"
          required
        />
      </div>
      <br />
      <div class="field">
        <label for="roll">Student Roll No.</label>
        <input
          placeholder="Enter Student Roll"
          type="text"
          name="sRoll"
          id="roll"
        />
      </div>
      <br />
      <div class="field">
        <label for="pContactNumber">Parent's Contact Number *</label>
        <input
          placeholder="Enter Parent's Contact Number"
          type="text"
          name="pContactNumber"
          id="pContactNumber"
          required
        />
      </div>
      <br />
      <input type="submit" value="Submit you form" />
    </form>

</html>
