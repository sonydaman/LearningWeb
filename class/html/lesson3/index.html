<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <h1>Feedback Form</h1>
    <form action="" method="post">
      <label for="Name">Student Name *</label>
      <input
        placeholder="Enter Student Name"
        type="text"
        name="sName"
        id="name"
        required
      />
      <br />
      <label for="">Student Class *</label>
      <input
        placeholder="Enter Student Class"
        type="text"
        name="sClass"
        id="class"
        required
      />
      <br />
      <label for="roll">Student Roll No.</label>
      <input
        placeholder="Enter Student Roll"
        type="text"
        name="sRoll"
        id="roll"
      />
      <br />
      <label for="pContactNumber">Parent's Contact Number *</label>
      <input
        placeholder="Enter Parent's Contact Number"
        type="text"
        name="pContactNumber"
        id="pContactNumber"
        required
      />
      <br />
      <input type="submit" value="Submit you form" />
    </form>
    <p>
      Lorem ipsum dolor sit amet, consectetur adipisicing elit. Dolorem quam

      placeat, porro sunt commodi!
    </p>
    <h2>My heading</h2>
  </body>
</html>
